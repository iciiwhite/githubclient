<!DOCTYPE html>
<html lang="en" class="bg-[#0d1117]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gh: {
                            bg: '#0d1117',
                            header: '#161b22',
                            card: '#161b22',
                            border: '#30363d',
                            text: '#e6edf3',
                            muted: '#8b949e',
                            accent: '#58a6ff',
                            green: '#3fb950',
                            red: '#f85149',
                            orange: '#d2991d',
                            input: '#0d1117',
                            hover: '#1f2428',
                            btn: '#21262d',
                            btnHover: '#30363d',
                            btnBorder: '#30363d',
                            sidebar: '#0d1117',
                            codeBg: '#161b22',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"Noto Sans"', 'Helvetica', 'Arial', 'sans-serif', '"Apple Color Emoji"', '"Segoe UI Emoji"'],
                        mono: ['JetBrains Mono', 'SFMono-Regular', 'Consolas', '"Liberation Mono"', 'Menlo', 'Courier', 'monospace'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.0/ace.min.js">
    </script>
    <style>
        * {
            scrollbar-width: thin;
            scrollbar-color: #30363d #0d1117;
        }
        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        *::-webkit-scrollbar-track {
            background: #0d1117;
        }
        *::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        *::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
        body {
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }
        .markdown-body {
            color: #e6edf3;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #e6edf3;
            border-bottom: 1px solid #30363d;
            padding-bottom: 8px;
            position: relative;
            scroll-margin-top: 80px;
        }
        .markdown-body h1 {
            font-size: 2em;
        }
        .markdown-body h2 {
            font-size: 1.5em;
        }
        .markdown-body h3 {
            font-size: 1.25em;
        }
        .markdown-body h4 {
            font-size: 1em;
        }
        .markdown-body h5 {
            font-size: 0.875em;
        }
        .markdown-body h6 {
            font-size: 0.85em;
            color: #8b949e;
        }
        .heading-link {
            float: left;
            margin-left: -20px;
            line-height: 1;
            padding-right: 4px;
            opacity: 0;
            transition: opacity 0.15s;
            color: #8b949e;
        }
        .markdown-body h1:hover .heading-link,
        .markdown-body h2:hover .heading-link,
        .markdown-body h3:hover .heading-link,
        .markdown-body h4:hover .heading-link,
        .markdown-body h5:hover .heading-link,
        .markdown-body h6:hover .heading-link {
            opacity: 0.7;
        }
        .markdown-body p {
            margin-bottom: 16px;
        }
        .markdown-body code {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 2px 6px;
            font-family: 'JetBrains Mono', SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace;
            font-size: 0.875em;
            color: #e6edf3;
        }
        .markdown-body pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .markdown-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.875em;
        }
        .markdown-body a {
            color: #58a6ff;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .markdown-body ul,
        .markdown-body ol {
            margin-bottom: 16px;
            padding-left: 2em;
        }
        .markdown-body li {
            margin-bottom: 4px;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }
        .markdown-body th,
        .markdown-body td {
            border: 1px solid #30363d;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background: #161b22;
            font-weight: 600;
        }
        .markdown-body blockquote {
            border-left: 4px solid #30363d;
            padding-left: 16px;
            margin-bottom: 16px;
            color: #8b949e;
        }
        .markdown-body img {
            max-width: 100%;
            border-radius: 6px;
        }
        .markdown-body hr {
            border: none;
            border-top: 1px solid #30363d;
            margin: 24px 0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .dropdown-content {
            display: none;
            position: absolute;
            z-index: 100;
        }
        .dropdown:hover .dropdown-content,
        .dropdown.active .dropdown-content {
            display: block;
        }
        .file-row:hover {
            background: #1a1f2b;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input,
        select,
        textarea {
            background: #0d1117;
            color: #e6edf3;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        button {
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #238636;
            color: #ffffff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: #2ea043;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-secondary:hover {
            background: #30363d;
        }
        .btn-danger {
            background: #21262d;
            color: #f85149;
            border: 1px solid #f85149;
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-danger:hover {
            background: #f85149;
            color: #fff;
        }
        .btn-green {
            background: #238636;
            color: #fff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-green:hover {
            background: #2ea043;
        }
        .ace-editor {
            width: 100%;
            min-height: 400px;
            border-radius: 6px;
            border: 1px solid #30363d;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        .ace-editor.readonly {
            min-height: 300px;
        }
        .ace_gutter {
            background: #161b22 !important;
            border-right: 1px solid #30363d !important;
        }
        .custom-radio {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #30363d;
            border-radius: 50%;
            background: #0d1117;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .custom-radio:checked {
            border-color: #58a6ff;
        }
        .custom-radio:checked::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #58a6ff;
        }
        .custom-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #30363d;
            border-radius: 4px;
            background: #0d1117;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .custom-checkbox:checked {
            border-color: #3fb950;
            background: #3fb950;
        }
        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 4px;
            width: 6px;
            height: 10px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .star-icon-filled {
            fill: #d2991d;
            color: #d2991d;
            stroke: #d2991d;
        }
    </style>
</head>

    <script>
        (function() {
            const GH_API = 'https://api.github.com';
            const MD_API = 'https://api.github.com/markdown';
            ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.0/');
            function getToken() { return localStorage.getItem('gh_pat'); }
            function setToken(t) { localStorage.setItem('gh_pat', t); }
            function clearToken() { localStorage.removeItem('gh_pat'); }

            async function renderSettingsPage(owner, repoName) { if (!currentUser) { renderTokenScreen(); return; } destroyAceInstances(); try { const repo = await apiFetch(`/repos/${owner}/${repoName}`); let pagesData = null; try { pagesData = await apiFetch(`/repos/${owner}/${repoName}/pages`); } catch (e) {} const branches = await apiFetch(`/repos/${owner}/${repoName}/branches?per_page=100`).catch(() => []); appEl.innerHTML = `${renderHeader()}<div class="max-w-5xl mx-auto px-3 sm:px-4 py-4"><div class="flex gap-6 flex-col md:flex-row"><aside class="w-full md:w-56 flex-shrink-0"><nav class="bg-[#161b22] border border-[#30363d] rounded-lg p-2 space-y-1 sticky top-20" id="settings-nav"><a href="#" class="settings-tab block px-3 py-2 text-sm rounded-md bg-[#1f2428] text-[#e6edf3] font-medium" data-tab="general">General</a><a href="#" class="settings-tab block px-3 py-2 text-sm rounded-md text-[#c9d1d9] hover:bg-[#1f2428] hover:text-[#e6edf3]" data-tab="pages">Pages</a><a href="#" class="settings-tab block px-3 py-2 text-sm rounded-md text-[#c9d1d9] hover:bg-[#1f2428] hover:text-[#e6edf3]" data-tab="collaborators">Collaborators</a><a href="#" class="settings-tab block px-3 py-2 text-sm rounded-md text-[#c9d1d9] hover:bg-[#1f2428] hover:text-[#e6edf3]" data-tab="branches">Branches</a><a href="#" class="settings-tab block px-3 py-2 text-sm rounded-md text-[#c9d1d9] hover:bg-[#1f2428] hover:text-[#e6edf3]" data-tab="webhooks">Webhooks</a></nav></aside><main class="flex-1 min-w-0"><div id="settings-panel-general" class="settings-panel space-y-4"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6"><h3 class="text-base font-semibold text-[#e6edf3] mb-4">General Settings</h3><div class="space-y-4"><div><label class="block text-sm text-[#e6edf3] mb-1">Repository name</label><input type="text" id="settings-name" class="w-full max-w-md" value="${escapeHtml(repo.name)}"></div><div><label class="block text-sm text-[#e6edf3] mb-1">Description</label><input type="text" id="settings-desc" class="w-full max-w-md" value="${escapeHtml(repo.description||'')}"></div><div><label class="block text-sm text-[#e6edf3] mb-1">Default branch</label><div class="relative custom-select max-w-md"><button id="settings-branch-btn" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-left text-sm flex items-center justify-between"><span id="settings-branch-text">${escapeHtml(repo.default_branch)}</span> ${icon('chevron-down','w-4 h-4')}</button><div id="settings-branch-dropdown" class="dropdown-content absolute w-full bg-[#161b22] border border-[#30363d] rounded-lg shadow-xl z-50 hidden max-h-48 overflow-y-auto">${branches.map(b => `<button class="w-full text-left px-4 py-2 text-sm hover:bg-[#1f2428]" data-value="${b.name}">${b.name}</button>`).join('')}</div></div></div><div><label class="block text-sm text-[#e6edf3] mb-2">Visibility</label><div class="space-y-2"><label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="visibility" value="public" class="custom-radio" ${!repo.private?'checked':''}><span class="text-sm">Public</span></label><label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="visibility" value="private" class="custom-radio" ${repo.private?'checked':''}><span class="text-sm">Private</span></label></div></div><button id="save-settings-btn" class="btn-primary">Save changes</button><p id="settings-msg" class="text-sm hidden"></p></div></div><div class="bg-[#161b22] border border-[#f85149]/30 rounded-lg p-6"><h3 class="text-base font-semibold text-[#f85149] mb-2">Danger Zone</h3><div class="space-y-4"><div class="flex items-center justify-between flex-wrap gap-3 p-3 border border-[#30363d] rounded-lg"><div><p class="text-sm font-medium text-[#e6edf3]">Archive this repository</p><p class="text-xs text-[#8b949e]">Mark as archived and read-only.</p></div><button id="archive-repo-btn" class="btn-danger text-sm">${repo.archived?'Unarchive':'Archive'} repository</button></div><div class="flex items-center justify-between flex-wrap gap-3 p-3 border border-[#30363d] rounded-lg"><div><p class="text-sm font-medium text-[#f85149]">Delete this repository</p><p class="text-xs text-[#8b949e]">Once deleted, there is no going back.</p></div><button id="delete-repo-btn" class="btn-danger text-sm">Delete repository</button></div><div id="delete-confirm" class="hidden p-3 border border-[#f85149]/50 rounded-lg"><p class="text-sm text-[#f85149] mb-3">Type <strong>${escapeHtml(repo.full_name)}</strong> to confirm:</p><input type="text" id="delete-confirm-input" class="w-full max-w-md mb-3"><button id="delete-confirm-btn" class="btn-danger" disabled>Delete</button></div></div></div></div><div id="settings-panel-pages" class="settings-panel space-y-4 hidden"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6"><h3 class="text-base font-semibold text-[#e6edf3] mb-4">GitHub Pages</h3>${pagesData?.html_url?`<p class="text-sm text-[#3fb950] mb-3 flex items-center gap-2">${icon('globe','w-4 h-4')} Live at <a href="${pagesData.html_url}" target="_blank" class="text-[#58a6ff] hover:underline font-semibold">${pagesData.html_url}</a></p>`:'<p class="text-sm text-[#8b949e] mb-3">Not configured.</p>'}<div class="space-y-4"><div><label class="block text-sm text-[#e6edf3] mb-2">Source</label><div class="space-y-2"><label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="pages-source" value="branch" class="custom-radio" ${!pagesData||pagesData.source?.branch?'checked':''}><span class="text-sm">Deploy from a branch</span></label><label class="flex items-center gap-3 cursor-pointer"><input type="radio" name="pages-source" value="actions" class="custom-radio" ${pagesData&&pagesData.source?.path==='/actions'?'checked':''}><span class="text-sm">GitHub Actions</span></label></div></div><div id="pages-branch-config"><label class="block text-sm text-[#e6edf3] mb-1">Branch</label><div class="relative custom-select max-w-md mb-3"><button id="pages-branch-btn" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-left text-sm flex items-center justify-between"><span id="pages-branch-text">${pagesData?.source?.branch||branches[0]?.name||'main'}</span> ${icon('chevron-down','w-4 h-4')}</button><div id="pages-branch-dropdown" class="dropdown-content absolute w-full bg-[#161b22] border border-[#30363d] rounded-lg shadow-xl z-50 hidden max-h-48 overflow-y-auto">${branches.map(b => `<button class="w-full text-left px-4 py-2 text-sm hover:bg-[#1f2428]" data-value="${b.name}">${b.name}</button>`).join('')}</div></div><label class="block text-sm text-[#e6edf3] mb-1">Folder</label><div class="relative custom-select max-w-md"><button id="pages-folder-btn" class="w-full bg-[#0d1117] border border-[#30363d] rounded-md px-3 py-2 text-left text-sm flex items-center justify-between"><span id="pages-folder-text">/ (root)</span> ${icon('chevron-down','w-4 h-4')}</button><div id="pages-folder-dropdown" class="dropdown-content absolute w-full bg-[#161b22] border border-[#30363d] rounded-lg shadow-xl z-50 hidden"><button class="w-full text-left px-4 py-2 text-sm hover:bg-[#1f2428]" data-value="/">/ (root)</button><button class="w-full text-left px-4 py-2 text-sm hover:bg-[#1f2428]" data-value="/docs">/docs</button></div></div></div><button id="save-pages-btn" class="btn-primary mt-3">Save Pages settings</button>${pagesData?`<button id="remove-pages-btn" class="btn-danger ml-2 mt-3">Remove Pages</button>`:''}</div></div></div><div id="settings-panel-collaborators" class="settings-panel space-y-4 hidden"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6"><h3 class="text-base font-semibold text-[#e6edf3] mb-4">Collaborators</h3><p class="text-sm text-[#8b949e]">Manage via GitHub website.</p></div></div><div id="settings-panel-branches" class="settings-panel space-y-4 hidden"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6"><h3 class="text-base font-semibold text-[#e6edf3] mb-4">Branches</h3><div class="space-y-2">${branches.map(b => `<div class="flex items-center gap-2 text-sm py-1 px-3 bg-[#0d1117] rounded">${icon('branch','w-4 h-4')} ${b.name} ${b.protected?'<span class="text-xs text-[#8b949e] border border-[#30363d] rounded-full px-2">Protected</span>':''}</div>`).join('')}</div></div></div><div id="settings-panel-webhooks" class="settings-panel space-y-4 hidden"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6"><h3 class="text-base font-semibold text-[#e6edf3] mb-4">Webhooks</h3><p class="text-sm text-[#8b949e]">Webhook management via GitHub website.</p></div></div></main></div></div>`; bindHeaderEvents(); bindSettingsTabs(); function setupCustomSelect(btnId, dropdownId, textId) { const btn = document.getElementById(btnId); const dropdown = document.getElementById(dropdownId); if (!btn || !dropdown) return; btn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); }); dropdown.querySelectorAll('button').forEach(opt => { opt.addEventListener('click', () => { document.getElementById(textId).textContent = opt.textContent; btn.dataset.value = opt.dataset.value; dropdown.classList.add('hidden'); }); }); document.addEventListener('click', () => { dropdown.classList.add('hidden'); }); } setupCustomSelect('settings-branch-btn','settings-branch-dropdown','settings-branch-text'); setupCustomSelect('pages-branch-btn','pages-branch-dropdown','pages-branch-text'); setupCustomSelect('pages-folder-btn','pages-folder-dropdown','pages-folder-text'); document.getElementById('save-settings-btn').addEventListener('click', async () => { const name = document.getElementById('settings-name').value.trim(); const desc = document.getElementById('settings-desc').value.trim(); const branch = document.getElementById('settings-branch-btn').dataset.value || repo.default_branch; const isPrivate = document.querySelector('input[name="visibility"]:checked')?.value === 'private'; try { await apiFetch(`/repos/${owner}/${repoName}`, { method: 'PATCH', body: JSON.stringify({ name, description: desc, private: isPrivate, default_branch: branch }) }); showToast('Settings saved!', 'success'); if (name !== repoName) { window.location.hash = `#/${owner}/${name}/settings`; navigate(); } } catch (e) { showToast(e.message, 'error'); } }); document.getElementById('save-pages-btn').addEventListener('click', async () => { const branch = document.getElementById('pages-branch-btn').dataset.value || branches[0]?.name; const folder = document.getElementById('pages-folder-btn').dataset.value || '/'; try { if (pagesData) { await apiFetch(`/repos/${owner}/${repoName}/pages`, { method: 'PUT', body: JSON.stringify({ source: { branch, path: folder } }) }); } else { await apiFetch(`/repos/${owner}/${repoName}/pages`, { method: 'POST', body: JSON.stringify({ source: { branch, path: folder }, build_type: 'legacy' }) }); } showToast('Pages settings saved!', 'success'); } catch (e) { showToast(e.message, 'error'); } }); document.getElementById('remove-pages-btn')?.addEventListener('click', async () => { if (confirm('Remove GitHub Pages?')) { try { await apiFetch(`/repos/${owner}/${repoName}/pages`, { method: 'DELETE' }); showToast('Pages removed.', 'info'); navigate(); } catch (e) { showToast(e.message, 'error'); } } }); document.getElementById('archive-repo-btn').addEventListener('click', async () => { const newArchived = !repo.archived; try { await apiFetch(`/repos/${owner}/${repoName}`, { method: 'PATCH', body: JSON.stringify({ archived: newArchived }) }); showToast(`Repository ${newArchived?'archived':'unarchived'}!`, 'success'); repo.archived = newArchived; document.getElementById('archive-repo-btn').textContent = `${newArchived?'Unarchive':'Archive'} repository`; } catch (e) { showToast(e.message, 'error'); } }); document.getElementById('delete-repo-btn').addEventListener('click', () => { document.getElementById('delete-confirm').classList.remove('hidden'); }); document.getElementById('delete-confirm-input').addEventListener('input', function() { document.getElementById('delete-confirm-btn').disabled = this.value.trim() !== repo.full_name; }); document.getElementById('delete-confirm-btn').addEventListener('click', async () => { try { await apiFetch(`/repos/${owner}/${repoName}`, { method: 'DELETE' }); showToast('Repository deleted.', 'info'); window.location.hash = '#/dashboard'; navigate(); } catch (e) { showToast(e.message, 'error'); } }); } catch (e) { appEl.innerHTML = `${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#f85149]">Error: ${escapeHtml(e.message)}</p></div>`; bindHeaderEvents(); } }
            function bindSettingsTabs() { const tabs = document.querySelectorAll('.settings-tab'); const panels = document.querySelectorAll('.settings-panel'); tabs.forEach(tab => { tab.addEventListener('click', function(e) { e.preventDefault(); tabs.forEach(t => { t.classList.remove('bg-[#1f2428]','text-[#e6edf3]','font-medium'); t.classList.add('text-[#c9d1d9]'); }); this.classList.add('bg-[#1f2428]','text-[#e6edf3]','font-medium'); this.classList.remove('text-[#c9d1d9]'); const target = this.dataset.tab; panels.forEach(p => p.classList.add('hidden')); document.getElementById('settings-panel-' + target)?.classList.remove('hidden'); }); }); }
            function parseHash() { const hash = window.location.hash.slice(1) || '/dashboard'; const [path, queryString] = hash.split('?'); const query = {}; if (queryString) { queryString.split('&').forEach(p => { const [k, v] = p.split('='); query[decodeURIComponent(k)] = decodeURIComponent(v || ''); }); } const parts = path.split('/').filter(Boolean); return { path, parts, query }; }
            async function navigate() { const { path, parts, query } = parseHash(); if (!getToken() && path !== '') { renderTokenScreen(); return; } if (!currentUser && getToken()) { const user = await loadUser(); if (!user) { renderTokenScreen(); return; } } if (!currentUser && !getToken()) { renderTokenScreen(); return; } destroyAceInstances(); if (parts.length === 0 || parts[0] === 'dashboard') { await renderDashboard(); } else if (parts.length === 1 && parts[0] === 'new') { await renderNewRepoPage(); } else if (parts.length === 1 && parts[0] === 'notifications') { await renderNotificationsPage(); } else if (parts.length === 1 && parts[0] === 'discover') { await renderDiscoverPage(); } else if (parts.length === 2 && parts[0] === 'settings' && parts[1] === 'profile') { await renderProfileSettingsPage(); } else if (parts.length === 1 && parts[0] === 'search') { await renderSearchPage(query.q || ''); } else if (parts.length === 1 && parts[0] === 'profile') { await renderProfilePage(); } else if (parts.length === 2 && parts[0] === 'u') { await renderUserPage(parts[1]); } else if (parts.length === 2 && parts[0] === 'orgs') { await renderOrgPage(parts[1]); } else if (parts.length === 3 && parts[0] === 'orgs' && parts[2] === 'new') { await renderOrgNewPage(parts[1]); } else if (parts.length === 2) { await renderRepoPage(parts[0], parts[1]); } else if (parts.length === 3 && parts[2] === 'issues') { await renderIssuesPage(parts[0], parts[1]); } else if (parts.length >= 4 && parts[2] === 'blob') { const branch = parts[3]; const subPath = parts.slice(4).join('/'); await renderBlobPage(parts[0], parts[1], branch, subPath); } else if (parts.length >= 4 && parts[2] === 'tree') { const branch = parts[3]; const subPath = parts.slice(4).join('/'); await renderTreePage(parts[0], parts[1], branch, subPath); } else if (parts.length >= 4 && parts[2] === 'edit') { const branch = parts[3]; const subPath = parts.slice(4).join('/'); await renderEditPage(parts[0], parts[1], branch, subPath); } else if (parts.length >= 4 && parts[2] === 'delete') { const branch = parts[3]; const subPath = parts.slice(4).join('/'); await renderDeletePage(parts[0], parts[1], branch, subPath); } else if (parts.length >= 4 && parts[2] === 'new') { const branch = parts[3]; const subPath = parts.slice(4).join('/'); await renderNewFilePage(parts[0], parts[1], branch, subPath); } else if (parts.length >= 4 && parts[2] === 'upload') { const branch = parts[3]; const subPath = parts.slice(4).join('/'); await renderUploadPage(parts[0], parts[1], branch, subPath); } else if (parts.length === 3 && parts[2] === 'settings') { await renderSettingsPage(parts[0], parts[1]); } else { appEl.innerHTML = `${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#8b949e]">Page not found</p><a href="#/dashboard" class="btn-secondary mt-4 inline-block">Go to dashboard</a></div>`; bindHeaderEvents(); } window.scrollTo(0, 0); }
            window.addEventListener('hashchange', navigate);
            async function init() { if (getToken()) { const user = await loadUser(); if (user) { await navigate(); return; } } renderTokenScreen(); }
            init();
        })();
    </script>
