    <script>(function(){
        const GH_API='https://api.github.com';const MD_API='https://api.github.com/markdown';
        ace.config.set('basePath','https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.0/');
        function getToken(){return localStorage.getItem('gh_pat')}
        function setToken(t){localStorage.setItem('gh_pat',t)}
        function clearToken(){localStorage.removeItem('gh_pat')}
        function encodeBase64(s){const b=new TextEncoder().encode(s);let r='';b.forEach(x=>r+=String.fromCharCode(x));return btoa(r)}
        function decodeBase64(s){try{const b=Uint8Array.from(atob(s),c=>c.charCodeAt(0));return new TextDecoder('utf-8').decode(b)}catch(e){return atob(s)}}
        async function apiFetch(path,opts={}){const t=getToken();const h={'Accept':'application/vnd.github+json','Content-Type':'application/json'};if(t)h['Authorization']='Bearer '+t;const r=await fetch(GH_API+path,{...opts,headers:{...h,...(opts.headers||{})}});if(!r.ok){const e=await r.json().catch(()=>({message:r.statusText}));throw new Error(e.message||'API error '+r.status)}if(r.status===204)return null;return r.json()}
        async function renderMarkdown(text){const r=await fetch(MD_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'text/html'},body:JSON.stringify({text,mode:'markdown'})});if(!r.ok)throw new Error('Markdown render failed');return r.text()}
        function showToast(msg,type='info'){const c=document.getElementById('toast-container');const cols={info:'bg-[#1a1f2b] border-[#30363d]',success:'bg-[#1a3a2a] border-[#3fb950]',error:'bg-[#3a1a1a] border-[#f85149]'};const t=document.createElement('div');t.className=`${cols[type]||cols.info} border rounded-lg px-4 py-3 mb-2 text-[#e6edf3] text-sm shadow-lg flex items-center gap-2`;t.innerHTML=`<svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},3500)}
        function icon(id,cls='w-4 h-4'){return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#icon-${id}"/></svg>`}
        function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function showModal(title,bodyHtml,onConfirm,confirmText='Confirm',danger=false){const mc=document.getElementById('modal-container');const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="modal-content"><h3 class="text-lg font-semibold text-[#e6edf3] mb-4">${title}</h3><div class="mb-4">${bodyHtml}</div><div class="flex justify-end gap-3"><button class="btn-secondary modal-cancel">Cancel</button><button class="${danger?'btn-danger':'btn-primary'} modal-confirm">${confirmText}</button></div></div>`;mc.appendChild(m);m.querySelector('.modal-cancel').addEventListener('click',()=>m.remove());m.querySelector('.modal-confirm').addEventListener('click',()=>{onConfirm(m);m.remove()});m.addEventListener('click',(e)=>{if(e.target===m)m.remove()})}
        function getAceMode(fn){const e=(fn.split('.').pop()||'').toLowerCase();const m={js:'javascript',jsx:'javascript',ts:'typescript',tsx:'typescript',py:'python',rb:'ruby',go:'golang',rs:'rust',java:'java',c:'c_cpp',cpp:'c_cpp',h:'c_cpp',css:'css',html:'html',xml:'xml',json:'json',yaml:'yaml',yml:'yaml',md:'markdown',sql:'sql',sh:'sh',bash:'sh',php:'php',swift:'swift',kt:'kotlin',scala:'scala',vue:'html',svelte:'html',graphql:'graphqlschema',dockerfile:'dockerfile',toml:'toml',ini:'ini',cfg:'ini',conf:'ini'};return m[e]||'text'}
        function isCopyableFile(fn){const e=(fn.split('.').pop()||'').toLowerCase();const b=['png','jpg','jpeg','gif','bmp','ico','webp','mp4','webm','ogg','mp3','wav','flac','avi','mov','mkv','zip','tar','gz','rar','7z','apk','exe','dll','bin','pdf','doc','docx','xls','xlsx','ppt','pptx','tiff','psd','ai','eps'];return !b.includes(e)||e==='svg'}
        function isImage(fn){const e=(fn.split('.').pop()||'').toLowerCase();return['png','jpg','jpeg','gif','bmp','ico','webp','svg','tiff','psd','ai','eps'].includes(e)}
        function isAudio(fn){const e=(fn.split('.').pop()||'').toLowerCase();return['mp3','wav','ogg','flac','m4a','aac'].includes(e)}
        function isVideo(fn){const e=(fn.split('.').pop()||'').toLowerCase();return['mp4','webm','ogg','avi','mov','mkv'].includes(e)}

        async function renderSearchPage(query){if(!currentUser){renderTokenScreen();return}destroyAceInstances();const repoResults=await apiFetch(`/search/repositories?q=${encodeURIComponent(query)}&per_page=20`).catch(()=>({items:[],total_count:0}));const userResults=await apiFetch(`/search/users?q=${encodeURIComponent(query)}&per_page=20`).catch(()=>({items:[],total_count:0}));appEl.innerHTML=`${renderHeader()}<div class="max-w-5xl mx-auto px-3 sm:px-4 py-6"><h2 class="text-lg font-semibold text-[#e6edf3] mb-4">Search results for "${escapeHtml(query)}"</h2><div class="flex gap-4 mb-4 border-b border-[#30363d]"><button class="search-tab px-4 py-2 text-sm font-medium text-[#e6edf3] border-b-2 border-[#d2991d] -mb-px" data-tab="repos">Repositories (${repoResults.total_count||repoResults.items.length})</button><button class="search-tab px-4 py-2 text-sm text-[#8b949e] hover:text-[#e6edf3] -mb-px" data-tab="users">Users (${userResults.total_count||userResults.items.length})</button></div><div id="tab-repos" class="space-y-3">${repoResults.items.map(repo=>`<div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4"><div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-[#8b949e]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><a href="#/${repo.full_name}" class="text-[#58a6ff] font-semibold text-sm hover:underline">${escapeHtml(repo.full_name)}</a></div><p class="text-xs text-[#8b949e] mb-2">${escapeHtml(repo.description||'')}</p><div class="flex items-center gap-3 text-xs text-[#8b949e]">${repo.language?`<span>${escapeHtml(repo.language)}</span>`:''}<span>${icon('star','w-3 h-3 inline')} ${repo.stargazers_count}</span></div></div>`).join('')}${repoResults.items.length===0?'<p class="text-[#8b949e] text-sm">No repositories found.</p>':''}</div><div id="tab-users" class="space-y-3 hidden">${userResults.items.map(user=>`<div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4 flex items-center gap-3"><img src="${user.avatar_url}" alt="" class="w-10 h-10 rounded-full" onerror="this.style.display='none'"><div><a href="#/u/${user.login}" class="text-[#58a6ff] font-semibold text-sm hover:underline">${escapeHtml(user.login)}</a>${user.type==='Organization'?'<span class="text-xs text-[#8b949e] ml-1">(Organization)</span>':''}</div></div>`).join('')}${userResults.items.length===0?'<p class="text-[#8b949e] text-sm">No users found.</p>':''}</div></div>`;bindHeaderEvents();document.querySelectorAll('.search-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.search-tab').forEach(t=>{t.classList.remove('border-b-2','border-[#d2991d]','text-[#e6edf3]');t.classList.add('text-[#8b949e]')});tab.classList.add('border-b-2','border-[#d2991d]','text-[#e6edf3]');tab.classList.remove('text-[#8b949e]');document.getElementById('tab-repos').classList.toggle('hidden',tab.dataset.tab!=='repos');document.getElementById('tab-users').classList.toggle('hidden',tab.dataset.tab!=='users')})})}
        async function renderUserPage(username){if(!currentUser){renderTokenScreen();return}destroyAceInstances();try{const user=await apiFetch(`/users/${username}`);const repos=await apiFetch(`/users/${username}/repos?sort=updated&per_page=30`);let isFollowing=false;try{await apiFetch(`/user/following/${username}`);isFollowing=true}catch(e){}appEl.innerHTML=`${renderHeader()}<div class="max-w-5xl mx-auto px-3 sm:px-4 py-6"><div class="flex items-start gap-4 mb-6 flex-col sm:flex-row"><img src="${user.avatar_url}" alt="" class="w-20 h-20 rounded-full" onerror="this.style.display='none'"><div class="flex-1"><h2 class="text-xl font-semibold text-[#e6edf3]">${escapeHtml(user.name||user.login)}</h2><p class="text-sm text-[#8b949e]">@${escapeHtml(user.login)}</p>${user.bio?`<p class="text-sm text-[#8b949e] mt-1">${escapeHtml(user.bio)}</p>`:''}<div class="flex items-center gap-4 mt-2 text-sm text-[#8b949e]"><span><strong class="text-[#e6edf3]">${user.followers}</strong> followers</span><span><strong class="text-[#e6edf3]">${user.following}</strong> following</span></div>${username!==currentUser.login?`<button id="follow-btn" class="btn-secondary text-sm mt-3 flex items-center gap-1">${isFollowing?icon('check','w-4 h-4')+' Following':icon('plus','w-4 h-4')+' Follow'}</button>`:''}</div></div><h3 class="text-base font-semibold text-[#e6edf3] mb-3">Repositories</h3><div class="space-y-3">${repos.map(repo=>`<div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4"><div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-[#8b949e]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><a href="#/${repo.full_name}" class="text-[#58a6ff] font-semibold text-sm hover:underline">${escapeHtml(repo.name)}</a><span class="text-xs border border-[#30363d] rounded-full px-2 py-0.5 text-[#8b949e]">${repo.private?'Private':'Public'}</span></div><p class="text-xs text-[#8b949e]">${escapeHtml(repo.description||'')}</p></div>`).join('')}</div></div>`;bindHeaderEvents();const fb=document.getElementById('follow-btn');if(fb){fb.addEventListener('click',async()=>{try{if(isFollowing){await apiFetch(`/user/following/${username}`,{method:'DELETE'});isFollowing=false;fb.innerHTML=`${icon('plus','w-4 h-4')} Follow`;showToast('Unfollowed','info')}else{await apiFetch(`/user/following/${username}`,{method:'PUT'});isFollowing=true;fb.innerHTML=`${icon('check','w-4 h-4')} Following`;showToast('Following!','success')}}catch(e){showToast(e.message,'error')}})}}catch(e){appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#f85149]">Error: ${escapeHtml(e.message)}</p></div>`;bindHeaderEvents()}}
        async function renderProfilePage(){if(!currentUser){renderTokenScreen();return}destroyAceInstances();const repos=await apiFetch('/user/repos?sort=updated&per_page=50&type=owner').catch(()=>[]);appEl.innerHTML=`${renderHeader()}<div class="max-w-5xl mx-auto px-3 sm:px-4 py-6"><div class="flex items-start gap-4 mb-6 flex-col sm:flex-row"><img src="${currentUser.avatar_url}" alt="" class="w-20 h-20 rounded-full" onerror="this.style.display='none'"><div><h2 class="text-xl font-semibold text-[#e6edf3]">${escapeHtml(currentUser.name||currentUser.login)}</h2><p class="text-sm text-[#8b949e]">@${escapeHtml(currentUser.login)}</p>${currentUser.bio?`<p class="text-sm text-[#8b949e] mt-1">${escapeHtml(currentUser.bio)}</p>`:''}</div></div><h3 class="text-base font-semibold text-[#e6edf3] mb-3">Your repositories</h3><div class="space-y-3">${repos.map(repo=>`<div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4"><div class="flex items-center gap-2 mb-1"><svg class="w-4 h-4 text-[#8b949e]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><a href="#/${repo.full_name}" class="text-[#58a6ff] font-semibold text-sm hover:underline">${escapeHtml(repo.name)}</a><span class="text-xs border border-[#30363d] rounded-full px-2 py-0.5 text-[#8b949e]">${repo.private?'Private':'Public'}</span></div><p class="text-xs text-[#8b949e]">${escapeHtml(repo.description||'')}</p></div>`).join('')}</div></div>`;bindHeaderEvents()}
        function parseHash(){const hash=window.location.hash.slice(1)||'/dashboard';const[path,queryString]=hash.split('?');const query={};if(queryString){queryString.split('&').forEach(p=>{const[k,v]=p.split('=');query[decodeURIComponent(k)]=decodeURIComponent(v||'')})}const parts=path.split('/').filter(Boolean);return{path,parts,query}}
        async function navigate(){const{path,parts,query}=parseHash();if(!getToken()&&path!==''){renderTokenScreen();return}if(!currentUser&&getToken()){const user=await loadUser();if(!user){renderTokenScreen();return}}if(!currentUser&&!getToken()){renderTokenScreen();return}destroyAceInstances();if(parts.length===0||parts[0]==='dashboard'){await renderDashboard()}else if(parts.length===1&&parts[0]==='new'){await renderNewRepoPage()}else if(parts.length===1&&parts[0]==='discover'){await renderDiscoverPage()}else if(parts.length===1&&parts[0]==='notifications'){await renderNotificationsPage()}else if(parts.length===1&&parts[0]==='search'){await renderSearchPage(query.q||'')}else if(parts.length===1&&parts[0]==='profile'){await renderProfilePage()}else if(parts.length===2&&parts[0]==='settings'&&parts[1]==='profile'){await renderUserSettingsPage()}else if(parts.length===2&&parts[0]==='u'){await renderUserPage(parts[1])}else if(parts.length===2&&parts[0]==='orgs'){await renderOrgPage(parts[1])}else if(parts.length===3&&parts[0]==='orgs'&&parts[2]==='new'){await renderOrgNewPage(parts[1])}else if(parts.length===2){await renderRepoPage(parts[0],parts[1])}else if(parts.length===3&&parts[2]==='issues'){await renderIssuesPage(parts[0],parts[1])}else if(parts.length>=4&&parts[2]==='blob'){await renderBlobPage(parts[0],parts[1],parts[3],parts.slice(4).join('/'))}else if(parts.length>=4&&parts[2]==='tree'){await renderTreePage(parts[0],parts[1],parts[3],parts.slice(4).join('/'))}else if(parts.length>=4&&parts[2]==='edit'){await renderEditPage(parts[0],parts[1],parts[3],parts.slice(4).join('/'))}else if(parts.length>=4&&parts[2]==='delete'){await renderDeletePage(parts[0],parts[1],parts[3],parts.slice(4).join('/'))}else if(parts.length>=4&&parts[2]==='new'){await renderNewFilePage(parts[0],parts[1],parts[3],parts.slice(4).join('/'))}else if(parts.length>=4&&parts[2]==='upload'){await renderUploadPage(parts[0],parts[1],parts[3],parts.slice(4).join('/'))}else if(parts.length===3&&parts[2]==='settings'){await renderSettingsPage(parts[0],parts[1])}else{appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#8b949e]">Page not found</p><a href="#/dashboard" class="btn-secondary mt-4 inline-block">Go to dashboard</a></div>`;bindHeaderEvents()}window.scrollTo(0,0)}
        window.addEventListener('hashchange',navigate);
        async function init(){if(getToken()){const user=await loadUser();if(user){await navigate();return}}renderTokenScreen()}
        init();
    })();</script>
